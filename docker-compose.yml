version: '3.8'

services:
  ppt-converter:
    build: .
    container_name: ppt-converter-container
    restart: always
    ports:
      - "4399:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    volumes:
      # 将输入和输出目录挂载到宿主机，实现文件持久化保留与直接上传映射
      - ./input:/app/input
      - ./output:/app/output
      # 持久化存储 SQLite 数据库状态
      - ./conversions.db:/app/conversions.db
    deploy:
      resources:
        limits:
          cpus: '2.0'         # 限制容器最多消耗 2 核 CPU
          memory: 2.0G        # 限制容器最多使用 2.0GB 内存，防止 OOM
